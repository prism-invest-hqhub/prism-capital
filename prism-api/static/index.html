<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="棱镜">
    <meta name="theme-color" content="#0a0a1a">
    <title>棱镜 Prism</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a1a;--card:#12122a;--card-hover:#1a1a3a;--border:#2a2a4a;--primary:#6c5ce7;--primary-light:#a29bfe;--accent:#00cec9;--red:#ff6b6b;--green:#51cf66;--yellow:#ffd43b;--text:#e8e8f0;--text-dim:#8888aa;--text-dimmer:#555577;--radius:16px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
        .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:radial-gradient(ellipse at top,#1a1a4a 0%,var(--bg) 70%)}
        .login-logo{width:100px;height:100px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:24px;box-shadow:0 8px 32px rgba(108,92,231,0.3)}
        .login-title{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .login-sub{color:var(--text-dim);font-size:14px;margin-bottom:40px}
        .login-input{width:100%;max-width:360px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;margin-bottom:16px}
        .login-input:focus{border-color:var(--primary)}
        .login-btn{width:100%;max-width:360px;padding:16px;background:linear-gradient(135deg,var(--primary),#5a4bd1);border:none;border-radius:12px;color:white;font-size:16px;font-weight:600;cursor:pointer}
        .login-btn:active{transform:scale(0.98);opacity:0.9}
        .login-hint{color:var(--text-dimmer);font-size:12px;margin-top:16px;text-align:center}
        .app{display:none;padding-top:calc(60px + var(--safe-top));padding-bottom:calc(80px + var(--safe-bottom))}
        .top-bar{position:fixed;top:0;left:0;right:0;height:calc(60px + var(--safe-top));padding-top:var(--safe-top);background:rgba(10,10,26,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:20px;z-index:100;border-bottom:1px solid rgba(42,42,74,0.5)}
        .top-bar-logo{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-bar-time{color:var(--text-dim);font-size:13px}
        .search-bar{margin:12px 16px;position:relative}
        .search-input{width:100%;padding:12px 16px 12px 44px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none}
        .search-input:focus{border-color:var(--primary)}
        .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);font-size:18px}
        .tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(80px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(10,10,26,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(42,42,74,0.5);z-index:100}
        .tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--text-dimmer);font-size:9px;cursor:pointer;padding:4px 4px;-webkit-tap-highlight-color:transparent}
        .tab-item.active{color:var(--primary-light)}
        .tab-icon{font-size:20px}
        .section{display:none;padding:0 16px}
        .section.active{display:block}
        .section-title{font-size:18px;font-weight:700;margin:20px 0 12px}
        .index-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .index-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
        .index-name{font-size:13px;color:var(--text-dim);margin-bottom:4px}
        .index-value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
        .index-change{font-size:13px;font-weight:600;margin-top:4px}
        .up{color:var(--red)}.down{color:var(--green)}
        .bond-table{width:100%;border-collapse:collapse}
        .bond-table th{font-size:11px;color:var(--text-dimmer);text-align:left;padding:8px 4px;border-bottom:1px solid var(--border);font-weight:500;position:sticky;top:0;background:var(--bg)}
        .bond-table td{font-size:13px;padding:10px 4px;border-bottom:1px solid rgba(42,42,74,0.3);font-variant-numeric:tabular-nums}
        .bond-rank{color:var(--primary-light);font-weight:700;width:30px}
        .bond-rating{display:inline-block;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(108,92,231,0.15);color:var(--primary-light)}
        .bond-rating.aaa{background:rgba(0,206,201,0.15);color:var(--accent)}
        .premium-green{color:var(--green)}
        .premium-yellow{color:var(--yellow)}
        .premium-red{color:var(--red)}
        .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-dimmer)}
        .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-dimmer)}
        .empty-icon{font-size:48px;margin-bottom:16px}
        .toast{position:fixed;top:calc(80px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.error{border-color:rgba(255,107,107,0.3);color:var(--red)}
        .toast.success{border-color:rgba(81,207,102,0.3);color:var(--green)}
        .refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--primary-light);font-size:13px;cursor:pointer;margin:8px 0}
        /* 持仓样式 */
        .position-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:12px}
        .position-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .position-name{font-size:18px;font-weight:700}
        .position-pnl{font-size:16px;font-weight:600}
        .position-pnl.positive{color:var(--green)}
        .position-pnl.negative{color:var(--red)}
        .position-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .position-detail{text-align:center;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px}
        .position-detail-label{font-size:11px;color:var(--text-dimmer);margin-bottom:4px}
        .position-detail-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
        /* 回测样式 */
        .backtest-form{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:16px}
        .form-row{margin-bottom:12px}
        .form-label{font-size:13px;color:var(--text-dim);margin-bottom:6px;display:block}
        .form-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
        .form-input:focus{border-color:var(--primary);outline:none}
        .backtest-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary),#5a4bd1);border:none;border-radius:10px;color:white;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .backtest-result{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
        .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .result-item{text-align:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px}
        .result-label{font-size:12px;color:var(--text-dimmer);margin-bottom:6px}
        .result-value{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
        /* 风控样式 */
        .risk-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:12px}
        .risk-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
        .risk-icon{font-size:20px}
        .risk-title{font-size:15px;font-weight:600}
        .risk-badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600}
        .risk-badge.high{background:rgba(255,107,107,0.15);color:var(--red)}
        .risk-badge.medium{background:rgba(255,212,59,0.15);color:var(--yellow)}
        .risk-badge.low{background:rgba(81,207,102,0.15);color:var(--green)}
        .risk-message{font-size:14px;color:var(--text-dim);line-height:1.5}
        .risk-time{font-size:12px;color:var(--text-dimmer);margin-top:8px}
        /* 告警样式 */
        .alert-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:12px}
        .alert-card.unread{border-color:var(--primary)}
        .alert-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .alert-title{font-size:15px;font-weight:600}
        .alert-severity{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
        .alert-severity.INFO{background:rgba(108,92,231,0.15);color:var(--primary-light)}
        .alert-severity.WARNING{background:rgba(255,212,59,0.15);color:var(--yellow)}
        .alert-severity.CRITICAL{background:rgba(255,107,107,0.15);color:var(--red)}
        .alert-message{font-size:14px;color:var(--text-dim);line-height:1.5}
        .alert-time{font-size:12px;color:var(--text-dimmer);margin-top:8px}
        .mark-read-btn{padding:8px 16px;background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.2);border-radius:8px;color:var(--primary-light);font-size:13px;cursor:pointer;margin-top:10px}
        /* 统计卡片 */
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
        .stat-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);text-align:center}
        .stat-value{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
        .stat-label{font-size:12px;color:var(--text-dimmer);margin-top:4px}
        /* 情感样式 */
        .sentiment-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:12px}
        .sentiment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .sentiment-score{font-size:28px;font-weight:700}
        .sentiment-label{font-size:13px;padding:4px 10px;border-radius:8px}
        .sentiment-label.positive{background:rgba(81,207,102,0.15);color:var(--green)}
        .sentiment-label.neutral{background:rgba(136,136,170,0.15);color:var(--text-dim)}
        .sentiment-label.negative{background:rgba(255,107,107,0.15);color:var(--red)}
        .sentiment-bars{display:flex;gap:8px;margin-top:12px}
        .sentiment-bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.1)}
        .sentiment-bar-fill{height:100%;border-radius:4px}
        .sentiment-bar-fill.positive{background:var(--green)}
        .sentiment-bar-fill.negative{background:var(--red)}
        .sentiment-bar-fill.neutral{background:var(--text-dim)}
    </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
    <div class="login-logo">🔷</div>
    <div class="login-title">棱镜</div>
    <div class="login-sub">Prism Capital · Level 5 全栈</div>
    <input type="password" class="login-input" id="tokenInput" placeholder="输入访问 Token">
    <button class="login-btn" onclick="doLogin()">进入棱镜</button>
    <div class="login-hint">仅限授权用户 · V5</div>
</div>
<div class="app" id="mainApp">
    <div class="top-bar">
        <div class="top-bar-logo">🔷 棱镜</div>
        <div class="top-bar-time" id="clock"></div>
    </div>
    <div class="section active" id="sectionMarket">
        <div class="section-title">💰 可转债双低排名</div>
        <button class="refresh-btn" onclick="loadBonds()">🔄 刷新</button>
        <div id="bondContent"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>
    <div class="section" id="sectionPortfolio">
        <div class="section-title">📊 持仓与盈亏</div>
        <button class="refresh-btn" onclick="loadPortfolio()">🔄 刷新</button>
        <div id="portfolioSummary"><div class="loading"><div class="spinner"></div>加载中...</div></div>
        <div id="portfolioContent"></div>
    </div>
    <div class="section" id="sectionBacktest">
        <div class="section-title">📈 策略回测</div>
        <div class="backtest-form">
            <div class="form-row">
                <label class="form-label">回测天数</label>
                <input type="number" class="form-input" id="btDays" value="180" min="30" max="365">
            </div>
            <div class="form-row">
                <label class="form-label">策略类型</label>
                <select class="form-input" id="btStrategy">
                    <option value="double_low">双低策略</option>
                    <option value="low_price">低价策略</option>
                </select>
            </div>
            <div class="form-row">
                <label class="form-label">双低阈值</label>
                <input type="number" class="form-input" id="btThreshold" value="110" min="100" max="130">
            </div>
            <div class="form-row">
                <label class="form-label">最大持仓</label>
                <input type="number" class="form-input" id="btPositions" value="5" min="1" max="20">
            </div>
            <div class="form-row">
                <label class="form-label">调仓周期(天)</label>
                <input type="number" class="form-input" id="btRebalance" value="10" min="1" max="30">
            </div>
            <button class="backtest-btn" onclick="runBacktest()">🚀 运行回测</button>
        </div>
        <div id="backtestResult"><div class="empty-state"><div class="empty-icon">📊</div><div>配置参数后点击运行回测</div></div></div>
    </div>
    <div class="section" id="sectionRisk">
        <div class="section-title">🛡️ 风险监控</div>
        <button class="refresh-btn" onclick="loadRiskReport()">🔄 刷新</button>
        <div id="riskReport"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>
    <div class="section" id="sectionAlert">
        <div class="section-title">🔔 告警中心</div>
        <button class="refresh-btn" onclick="loadAlerts()">🔄 刷新</button>
        <div id="alertSummary"></div>
        <div id="alertContent"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>
    <div class="section" id="sectionChat" style="display:flex;flex-direction:column;height:calc(100vh - 140px);padding:0 16px">
        <div class="section-title">💬 与棱镜聊天</div>
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch"></div>
        <div style="display:flex;gap:8px;padding:8px 0 12px;position:sticky;bottom:0;background:var(--bg)">
            <input id="chatInput" type="text" placeholder="输入消息..." style="flex:1;background:rgba(42,42,74,0.4);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:15px;outline:none" onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:none;border-radius:12px;padding:10px 18px;color:#fff;font-size:15px;font-weight:600;cursor:pointer">发送</button>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('Market',this)"><span class="tab-icon">💰</span><span>行情</span></div>
        <div class="tab-item" onclick="switchTab('Portfolio',this)"><span class="tab-icon">📊</span><span>持仓</span></div>
        <div class="tab-item" onclick="switchTab('Backtest',this)"><span class="tab-icon">📈</span><span>回测</span></div>
        <div class="tab-item" onclick="switchTab('Risk',this)"><span class="tab-icon">🛡️</span><span>风控</span></div>
        <div class="tab-item" onclick="switchTab('Alert',this)"><span class="tab-icon">🔔</span><span>告警</span></div>
        <div class="tab-item" onclick="switchTab('Chat',this)"><span class="tab-icon">💬</span><span>聊天</span></div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API=window.location.origin;let TOKEN=localStorage.getItem('prism_token')||'';
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
setInterval(updateClock,1e3);updateClock();
function showToast(m,t='success'){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.className='toast',2500)}
async function apiFetch(p,o={}){const r=await fetch(API+p,{...o,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...o.headers}});if(r.status===401||r.status===403){showToast('Token无效','error');doLogout();return null}try{return await r.json()}catch{return null}}
async function doLogin(){const i=document.getElementById('tokenInput').value.trim();if(!i){showToast('请输入Token','error');return}TOKEN=i;try{const r=await fetch(API+'/daily-brief',{headers:{'Authorization':'Bearer '+TOKEN}});if(r.ok){localStorage.setItem('prism_token',TOKEN);enterApp();showToast('登录成功')}else{showToast('Token无效','error')}}catch(e){showToast('连接失败','error')}}
function doLogout(){TOKEN='';localStorage.removeItem('prism_token');document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none'}
function enterApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';loadBonds();loadPortfolio()}
function switchTab(n,el){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('section'+n).classList.add('active');if(n==='Portfolio')loadPortfolio();if(n==='Backtest'){}if(n==='Risk')loadRiskReport();if(n==='Alert')loadAlerts()}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtAmt(v){return v>=1e8?(v/1e8).toFixed(1)+'亿':v>=1e4?(v/1e4).toFixed(1)+'万':v.toFixed(0)}
function getPremiumClass(p){if(p===undefined||p===null)return'';return p<20?'premium-green':p<=40?'premium-yellow':'premium-red'}
// 可转债双低排名
async function loadBonds(){const d=await apiFetch('/bond/double-low?top=30');if(!d)return;const c=document.getElementById('bondContent'),b=d.data||[];if(!b.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>暂无数据</div></div>';return}let h='<table class="bond-table"><thead><tr><th>#</th><th>名称</th><th>价格</th><th>双低</th><th>溢价率</th><th>成交额</th><th>评级</th></tr></thead><tbody>';b.forEach((x,i)=>{const r=x['评级']||'';let rc='bond-rating';if(r==='AAA')rc+=' aaa';const premium=x['溢价率'];const pc=getPremiumClass(premium);h+='<tr><td class="bond-rank">'+(i+1)+'</td><td>'+escHtml(x['名称']||'')+'</td><td>'+(x['价格']?x['价格'].toFixed(2):'-')+'</td><td>'+(x['双低值']?x['双低值'].toFixed(2):'-')+'</td><td class="'+pc+'">'+(premium!==undefined&&premium!==null?premium.toFixed(2)+'%':'-')+'</td><td>'+fmtAmt(x['成交额']||0)+'</td><td><span class="'+rc+'">'+escHtml(r)+'</span></td></tr>'});h+='</tbody></table>';c.innerHTML=h}
// 持仓与盈亏
async function loadPortfolio(){const d=await apiFetch('/portfolio');if(!d){document.getElementById('portfolioSummary').innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>暂无持仓数据</div></div>';return}const p=d.data||{};let html='<div class="stats-grid"><div class="stat-card"><div class="stat-value '+((p.realized_pnl||0)>=0?'up':'down')+'">'+(p.realized_pnl>=0?'+':'')+((p.realized_pnl||0)/10000).toFixed(2)+'万</div><div class="stat-label">已实现盈亏(万)</div></div><div class="stat-card"><div class="stat-value">'+(p.open_positions||0)+'</div><div class="stat-label">持仓数量</div></div></div>';document.getElementById('portfolioSummary').innerHTML=html;const h=p.holdings||[];if(!h.length){document.getElementById('portfolioContent').innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div>暂无持仓</div></div>';return}let c='<div style="margin-top:12px">';h.forEach(x=>{c+='<div class="position-card"><div class="position-header"><div class="position-name">'+escHtml(x.name||x.code)+'</div><div class="position-pnl">'+escHtml(x.code)+'</div></div><div class="position-details"><div class="position-detail"><div class="position-detail-label">持仓数量</div><div class="position-detail-value">'+(x.net_qty||0)+'</div></div><div class="position-detail"><div class="position-detail-label">成本(元)</div><div class="position-detail-value">'+(x.net_cost||0).toFixed(2)+'</div></div><div class="position-detail"><div class="position-detail-label">均价</div><div class="position-detail-value">'+((x.net_qty?x.net_cost/x.net_qty:0)||0).toFixed(2)+'</div></div></div></div>'});c+='</div>';document.getElementById('portfolioContent').innerHTML=c}
// 策略回测
async function runBacktest(){const days=parseInt(document.getElementById('btDays').value)||180;const strategy=document.getElementById('btStrategy').value;document.getElementById('backtestResult').innerHTML='<div class="loading"><div class="spinner"></div>回测中...</div>';const d=await apiFetch('/backtest?days='+days+'&strategy='+strategy);if(!d){document.getElementById('backtestResult').innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><div>回测失败</div></div>';return}const r=d.data||{};let html='<div class="backtest-result"><div class="result-grid"><div class="result-item"><div class="result-value '+(r.total_return>=0?'up':'down')+'">'+(r.total_return>=0?'+':'')+((r.total_return||0)*100).toFixed(1)+'%</div><div class="result-label">总收益</div></div><div class="result-item"><div class="result-value '+(r.annual_return>=0?'up':'down')+'">'+(r.annual_return>=0?'+':'')+((r.annual_return||0)*100).toFixed(1)+'%</div><div class="result-label">年化收益</div></div><div class="result-item"><div class="result-value down">'+(Math.abs(r.max_drawdown||0)*100).toFixed(1)+'%</div><div class="result-label">最大回撤</div></div><div class="result-item"><div class="result-value">'+(r.sharpe||0).toFixed(2)+'</div><div class="result-label">夏普比率</div></div></div><div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="position-detail"><div class="position-detail-label">交易次数</div><div class="position-detail-value">'+(r.trade_count||0)+'</div></div><div class="position-detail"><div class="position-detail-label">胜率</div><div class="position-detail-value">'+(r.win_rate?((r.win_rate)*100).toFixed(1)+'%':'-')+'</div></div></div></div>';document.getElementById('backtestResult').innerHTML=html}
// 风控报告
async function loadRiskReport(){const d=await apiFetch('/risk/report');if(!d){document.getElementById('riskReport').innerHTML='<div class="empty-state"><div class="empty-icon">🛡️</div><div>暂无风控数据</div></div>';return}const r=d.data||{};const signals=r.signals||[];if(!signals.length){document.getElementById('riskReport').innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div>当前无风险信号</div></div>';return}let html='<div class="stats-grid"><div class="stat-card"><div class="stat-value">'+(r.total_risk_signals||signals.length)+'</div><div class="stat-label">风险信号</div></div><div class="stat-card"><div class="stat-value">'+(r.market_status||'正常')+'</div><div class="stat-label">市场状态</div></div></div>';signals.forEach(s=>{const lvl=s.level||'low';html+='<div class="risk-card"><div class="risk-header"><span class="risk-icon">⚠️</span><span class="risk-title">'+escHtml(s.signal_type||'风险信号')+'</span><span class="risk-badge '+lvl+'">'+s.severity||'低'+'</span></div><div class="risk-message">'+escHtml(s.message||'')+'</div><div class="risk-time">'+escHtml(s.created_at||'')+'</div></div>'});document.getElementById('riskReport').innerHTML=html}
// 告警列表
async function loadAlerts(){const d=await apiFetch('/alerts?limit=20');if(!d){document.getElementById('alertContent').innerHTML='<div class="empty-state"><div class="empty-icon">🔔</div><div>暂无告警</div></div>';return}const alerts=d.data||[];const unread=alerts.filter(a=>!a.is_read).length;document.getElementById('alertSummary').innerHTML='<div class="stats-grid" style="margin-bottom:12px"><div class="stat-card"><div class="stat-value">'+unread+'</div><div class="stat-label">未读告警</div></div><div class="stat-card"><div class="stat-value">'+alerts.length+'</div><div class="stat-label">总告警数</div></div></div>';if(!alerts.length){document.getElementById('alertContent').innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div>暂无告警</div></div>';return}let html='';alerts.forEach(a=>{const sev=a.severity||'INFO';html+='<div class="alert-card '+(a.is_read?'':'unread')+'" id="alert-'+a.id+'"><div class="alert-header"><span class="alert-title">'+escHtml(a.title||'')+'</span><span class="alert-severity '+sev+'">'+sev+'</span></div><div class="alert-message">'+escHtml(a.message||'')+'</div><div class="alert-time">'+escHtml(a.created_at||'')+'</div>'+(a.is_read?'':'<button class="mark-read-btn" onclick="markAlertRead('+a.id+')">✓ 标记已读</button>')+'</div>'});document.getElementById('alertContent').innerHTML=html}
async function markAlertRead(id){const d=await apiFetch('/alerts/'+id+'/read',{method:'POST'});if(d&&d.success){showToast('已标记已读');loadAlerts()}else{showToast('操作失败','error')}}
// 聊天功能
let chatLoading=false;
function appendChatMsg(role,text){
    const c=document.getElementById('chatMessages');
    const d=document.createElement('div');
    d.style.cssText='margin-bottom:10px;display:flex;'+(role==='user'?'justify-content:flex-end':'justify-content:flex-start');
    const b=document.createElement('div');
    b.style.cssText='max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word;'+(role==='user'?'background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-bottom-right-radius:4px':'background:rgba(42,42,74,0.5);color:var(--text);border-bottom-left-radius:4px');
    b.textContent=text;
    d.appendChild(b);
    c.appendChild(d);
    c.scrollTop=c.scrollHeight;
}
async function sendChat(){
    if(chatLoading)return;
    const input=document.getElementById('chatInput');
    const msg=input.value.trim();
    if(!msg)return;
    input.value='';
    appendChatMsg('user',msg);
    chatLoading=true;
    const loadingDiv=document.createElement('div');
    loadingDiv.id='chatLoading';
    loadingDiv.style.cssText='margin-bottom:10px;display:flex;justify-content:flex-start';
    loadingDiv.innerHTML='<div style="background:rgba(42,42,74,0.5);color:var(--text-dimmer);padding:10px 14px;border-radius:14px;border-bottom-left-radius:4px;font-size:14px">棱镜思考中...</div>';
    document.getElementById('chatMessages').appendChild(loadingDiv);
    try{
        const r=await fetch(API+'/brain/chat',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({message:msg,use_llm:true})});
        const d=await r.json();
        document.getElementById('chatLoading')?.remove();
        if(d.reply){appendChatMsg('bot',d.reply)}else{appendChatMsg('bot','(无回复，请重试)')}
    }catch(e){document.getElementById('chatLoading')?.remove();appendChatMsg('bot','连接失败，请重试')}
    chatLoading=false;
}

if(TOKEN){fetch(API+'/daily-brief',{headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>{if(r.ok)enterApp()}).catch(()=>{})}
