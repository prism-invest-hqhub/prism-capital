version: '3.8'

services:
  prism-api:
    build: ./prism-api
    container_name: prism-api
    restart: always
    ports:
      - "8900:8900"
    environment:
      - JWT_SECRET=prism-capital-2026-secret-key-change-in-production
      - ADMIN_KEY=prism-admin-2026
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: prism-tunnel
    restart: always
    command: tunnel --url http://prism-api:8900
    depends_on:
      - prism-api
